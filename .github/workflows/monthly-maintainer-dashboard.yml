name: Monthly Maintainer Dashboard

on:
  schedule:
    - cron: "20 5 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-dashboard:
    name: Refresh Maintainer Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: monthly-maintainer-dashboard-${{ github.repository }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate dashboard
        run: npm run dashboard:generate

      - name: Commit dashboard update
        run: |
          if git diff --quiet -- docs/MAINTAINER_DASHBOARD.md; then
            echo "Dashboard is already current."
            exit 0
          fi

          git config user.name "P-r-e-m-i-u-m"
          git config user.email "P-r-e-m-i-u-m@users.noreply.github.com"
          git add docs/MAINTAINER_DASHBOARD.md
          git commit -m "docs: refresh maintainer dashboard"
          git push
