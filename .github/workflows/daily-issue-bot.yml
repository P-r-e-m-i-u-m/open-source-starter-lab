name: Daily Issue Bot

on:
  schedule:
    - cron: "30 4 * * *"
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-daily-issue:
    name: Create Daily Starter Issue
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: daily-issue-bot-${{ github.repository }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Create issue
        run: npm run issue:create
        env:
          GITHUB_TOKEN: ${{ secrets.MAINTAINER_TOKEN }}
