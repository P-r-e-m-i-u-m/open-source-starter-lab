name: Weekly Help Thread

on:
  schedule:
    - cron: "45 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  discussions: write

jobs:
  create-weekly-help-thread:
    name: Create Weekly Discussion
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: weekly-help-thread-${{ github.repository }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Create weekly help discussion
        run: npm run discussion:weekly-help
        env:
          MAINTAINER_TOKEN: ${{ secrets.MAINTAINER_TOKEN }}
