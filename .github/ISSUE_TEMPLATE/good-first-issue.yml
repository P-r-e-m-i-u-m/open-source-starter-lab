name: Good first issue
description: A small task designed for new contributors.
title: "[Good First Issue]: "
labels: ["good first issue"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should the contributor improve?
      placeholder: Add a short docs page that explains...
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Suggested files
      description: Where should someone start?
      placeholder: docs/FIRST_PULL_REQUEST.md
    validations:
      required: true
  - type: textarea
    id: decoder
    attributes:
      label: First issue decoder
      description: Help a beginner understand the task before they code.
      placeholder: |
        What this means:
        Skill needed:
        Time estimate:
        First command:
        What not to change:
        PR proof:
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Done when
      description: Clear acceptance criteria.
      placeholder: |
        - The guide has copy-paste commands
        - The README links to it
        - npm run check passes
    validations:
      required: true
